name: Manual Build Trigger (No Sign)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Find Xcode project
        id: find_project
        run: |
          proj_dir=$(find . -name "*.xcodeproj" -type d | head -1)
          if [ -z "$proj_dir" ]; then
            echo "No Xcode project found!"
            exit 1
          fi
          proj_name=$(basename "$proj_dir" .xcodeproj)
          echo "project_dir=$proj_dir" >> $GITHUB_OUTPUT
          echo "project_name=$proj_name" >> $GITHUB_OUTPUT
          echo "Found: $proj_name in $proj_dir"
      
      - name: Build for Simulator
        run: |
          proj_dir="${{ steps.find_project.outputs.project_dir }}"
          proj_name="${{ steps.find_project.outputs.project_name }}"
          
          echo "Building $proj_name for iOS Simulator..."
          
          xcodebuild \
            -project "$proj_dir" \
            -scheme "$proj_name" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="x86_64 arm64" \
            VALID_ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            build \
            | tee build.log \
            | xcpretty || {
              echo "Build failed!"
              tail -100 build.log
              exit 1
            }
          
          echo "Build completed successfully!"
          echo "Finding .app bundle..."
          find build -name "*.app" -type d | head -5
          
          # Copy app to artifacts folder
          mkdir -p artifacts
          app_path=$(find build -name "*.app" -type d | head -1)
          if [ -n "$app_path" ]; then
            cp -R "$app_path" artifacts/
            echo "Copied app to artifacts/"
            ls -la artifacts/
          else
            echo "No .app bundle found!"
            exit 1
          fi
      
      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: App-Spam-Otp-Simulator
          path: artifacts/*.app
          retention-days: 14
      
      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Log
          path: build.log
          retention-days: 7
