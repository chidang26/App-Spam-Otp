name: Manual Build Trigger (No Sign)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: List project structure
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo ""
          echo "=== Xcode Project Files ==="
          find . -name "*.xcodeproj" -o -name "*.xcworkspace"
          echo ""
          echo "=== Project.pbxproj ==="
          find . -name "project.pbxproj" | head -1 | xargs cat 2>/dev/null | head -50
      
      - name: Find Xcode project
        id: find_project
        run: |
          # Find the .xcodeproj directory
          proj_dir=$(find . -name "*.xcodeproj" -type d | head -1)
          if [ -z "$proj_dir" ]; then
            echo "No Xcode project found!"
            exit 1
          fi
          echo "project_dir=$proj_dir" >> $GITHUB_OUTPUT
          echo "Found project: $proj_dir"
          
          # Extract project name (without .xcodeproj)
          proj_name=$(basename "$proj_dir" .xcodeproj)
          echo "project_name=$proj_name" >> $GITHUB_OUTPUT
          echo "Project name: $proj_name"
      
      - name: Build without code signing
        run: |
          proj_dir="${{ steps.find_project.outputs.project_dir }}"
          proj_name="${{ steps.find_project.outputs.project_name }}"
          
          echo "=== Building $proj_name ==="
          echo "Project directory: $proj_dir"
          
          # Build with code signing disabled
          xcodebuild \
            -project "$proj_dir" \
            -scheme "$proj_name" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            ONLY_ACTIVE_ARCH=YES \
            | tee build.log \
            | xcpretty || {
              echo "Build failed! Showing last 100 lines of log:"
              tail -100 build.log
              exit 1
            }
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: App-Spam-Otp-Debug
          path: |
            build/Debug-iphonesimulator/*.app
            build.log
          retention-days: 7
