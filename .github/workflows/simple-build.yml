name: Simple iOS Build Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  test-build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Show project structure
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo ""
          echo "=== Xcode Project ==="
          find . -name "*.xcodeproj" -type d
      
      - name: List available simulators
        run: |
          echo "=== Available Simulators ==="
          xcrun simctl list devices available | head -50
      
      - name: Try xcodebuild list
        run: |
          echo "=== Listing Xcode schemes ==="
          xcodebuild -project ./xcodeapptesst/xcodeapptesst.xcodeproj -list
      
      - name: Build with xcodebuild (generic)
        run: |
          echo "=== Starting build ==="
          xcodebuild -project ./xcodeapptesst/xcodeapptesst.xcodeproj -scheme xcodeapptesst -sdk iphonesimulator CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY= -configuration Debug build 2>&1 | tee build_output.log
          echo "=== Build finished ==="
      
      - name: Show build result
        run: |
          echo "=== Last 50 lines of build output ==="
          tail -50 build_output.log
          echo ""
          echo "=== Checking for errors ==="
          if grep -q "error:" build_output.log; then
            echo "ERRORS FOUND:"
            grep "error:" build_output.log | tail -20
          else
            echo "No errors found!"
          fi
      
      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: build_output.log
          retention-days: 3
